	<!-- Base JavaScript -->
	<script>
	// Set current year
	document.getElementById('currentYear').textContent = new Date().getFullYear();
	// Theme management
	const savedTheme = localStorage.getItem('theme') || 'light';
	document.documentElement.setAttribute('data-theme', savedTheme);
	const themeToggle = document.getElementById('themeToggle');

	function toggleTheme() {
		const currentTheme = document.documentElement.getAttribute('data-theme');
		const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
		document.documentElement.setAttribute('data-theme', newTheme);
		localStorage.setItem('theme', newTheme);
	}
	if(themeToggle) {
		themeToggle.addEventListener('click', toggleTheme);
	}
	// Sidebar management
	const sidebar = document.getElementById('sidebar');
	const sidebarToggleBtn = document.getElementById('sidebarToggleBtn');
	const closeSidebarBtn = document.getElementById('closeSidebarBtn');
	const sidebarOverlay = document.getElementById('sidebarOverlay');
	// Restore sidebar state from localStorage (desktop only; always collapsed on mobile)
	const sidebarState = localStorage.getItem('sidebarOpen');
	if(window.innerWidth < 1024) {
		document.body.classList.add('sidebar-collapsed');
	} else if(sidebarState === 'false') {
		document.body.classList.add('sidebar-collapsed');
	} else {
		document.body.classList.remove('sidebar-collapsed');
	}

	function toggleSidebar() {
		document.body.classList.toggle('sidebar-collapsed');
		const isOpen = !document.body.classList.contains('sidebar-collapsed');
		localStorage.setItem('sidebarOpen', isOpen);
	}

	function closeSidebarMobile() {
		if(window.innerWidth < 768) {
			document.body.classList.add('sidebar-collapsed');
			localStorage.setItem('sidebarOpen', 'false');
		}
	}
	if(sidebarToggleBtn) {
		sidebarToggleBtn.addEventListener('click', toggleSidebar);
	}
	if(closeSidebarBtn) {
		closeSidebarBtn.addEventListener('click', toggleSidebar);
	}
	if(sidebarOverlay) {
		sidebarOverlay.addEventListener('click', closeSidebarMobile);
	}
	// Highlight active sidebar link
	const currentPath = window.location.pathname;
	const sidebarLinks = document.querySelectorAll('.sidebar-link');
	sidebarLinks.forEach(link => {
		if(link.getAttribute('href') === currentPath) {
			link.classList.add('active');
			// Scroll active link into view in sidebar
			setTimeout(() => {
				link.scrollIntoView({
					block: 'center',
					behavior: 'instant'
				});
			}, 50);
		}
	});
	</script>
